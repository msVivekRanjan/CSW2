<!DOCTYPE html>
<html>
<head>
    <title>Styles Example</title>

    <link rel="stylesheet" href="Q7.css">

    <style>
        #h3style { text-align: center; font-weight: bold; }
        #h4style { text-align: right; font-weight: bold; }
    </style>

</head>
<body>

    <h1 style="color: blue; font-size: 30px;">Heading 1</h1>
    <h2 style="color: green; font-size: 25px;">Heading 2</h2>

    <h3 id="h3style">Heading 3</h3>
    <h4 id="h4style">Heading 4</h4>

    <h5>Heading 5</h5>

    <p class="pstyle">This is a paragraph.</p>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Styled Table</title>

    <style>
        table { border-collapse: collapse; width: 60%; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        tr:nth-child(even) { background-color: lightgray; }
    </style>

</head>
<body>

    <table>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>Vivek</td>
            <td>101</td>
            <td>90</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>102</td>
            <td>80</td>
        </tr>

        <tr>
            <td>Aman</td>
            <td>103</td>
            <td>85</td>
        </tr>

    </table>

</body>
</html>
